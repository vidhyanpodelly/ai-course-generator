# Server configuration
server.port=8080

# Database configurations with environment fallbacks
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/aicourseDB}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:your_database_password_here}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Security properties
security.jwt.secret=${JWT_SECRET:your_jwt_secret_here}
security.jwt.expiration=3600000

# File Upload configurations
app.upload.dir=./uploads


# OpenRouter configurations
ai.openrouter.key=${OPENROUTER_API_KEY:your_openrouter_api_key_here}
ai.openrouter.url=https://openrouter.ai/api/v1/chat/completions
ai.openrouter.model=poolside/laguna-m.1:free

# Multipart configuration
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Logging configuration
logging.level.com.aicoursegenerator=DEBUG
logging.level.com.aicoursegenerator.ai.service=DEBUG
logging.level.com.aicoursegenerator.chat.service=DEBUG
logging.level.com.aicoursegenerator.quiz.service=DEBUG
logging.level.org.springframework.security=INFO

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Set timeouts (in milliseconds) so it fails fast instead of hanging for 2-3 minutes
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
